<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klankenbord</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: white;
    text-align: center;
}

h1 {
    padding: 10px;
    font-size: 18px;
}

#soundboard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    padding: 8px;
}

button {
    background: #222;
    border: none;
    border-radius: 10px;
    padding: 12px 6px;
    font-size: 13px;
    color: white;
}

button:active {
    transform: scale(0.95);
    background: #444;
}

.plays {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
}

@media (max-width: 480px) {
    #soundboard {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>

<h1>🎧 Klankenbord</h1>
<div id="soundboard"></div>

<script>
const files = [
    "Heheey.mp3",
    "Ja goed hoor.mp3",
    "MJaa.mp3",
    "Nee.mp3",
    "Met jou ook.mp3",
    "Ja doe maar.mp3",
    "Ooo wat geil.mp3",
    "Oo wacht even.mp3",
    "Ja zometeen.mp3",
    "Ik hoor je niet.mp3",
    "Okee.mp3",
    "Ja ik hoor je.mp3",
    "Eerst even klaarkomen.mp3",
    "Vond je het geil?.mp3",
    "Tot de volgende keer.mp3",
    "Ja oke is goed dat wil ik wel.mp3",
    "Waarom zo ongeduldig.mp3",
    "Ja ik wil eerst even klaarkomen.mp3",
    "Mag ik jou zien komen mag ik jou zien klaarkomen.mp3"
];

let plays = JSON.parse(localStorage.getItem("plays")) || {};
let audioPool = {};
let current = null;

// 🔥 preload ALLES (belangrijk voor iOS)
files.forEach(f => {
    const a = new Audio("sounds/" + f.replace(/ /g, "%20"));
    a.preload = "auto";
    a.setAttribute("playsinline", "");
    audioPool[f] = a;
});

function render() {
    const board = document.getElementById("soundboard");
    board.innerHTML = "";

    files.forEach(file => {
        const btn = document.createElement("button");

        btn.innerHTML = `
            ${file.replace(".mp3","")}
            <div class="plays">${plays[file] || 0}x</div>
        `;

        btn.onclick = () => {

            // stop vorige
            if (current) {
                current.pause();
                current.currentTime = 0;
            }

            const audio = audioPool[file];
            audio.currentTime = 0;

            const p = audio.play();

            if (p !== undefined) {
                p.catch(err => console.log(err));
            }

            current = audio;

            plays[file] = (plays[file] || 0) + 1;
            localStorage.setItem("plays", JSON.stringify(plays));

            // ❌ GEEN render() meer hier (dit was je bug)
            btn.querySelector(".plays").innerText = plays[file] + "x";

            if (navigator.vibrate) navigator.vibrate(20);
        };

        board.appendChild(btn);
    });
}

render();
</script>

</body>
</html>
