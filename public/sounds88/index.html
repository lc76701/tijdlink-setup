<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klankenbord</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: white;
    text-align: center;
}

h1 {
    padding: 10px;
    font-size: 18px;
}

#soundboard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    padding: 8px;
}

button {
    background: #222;
    border: none;
    border-radius: 10px;
    padding: 12px 6px;
    font-size: 13px;
    color: white;
}

button:active {
    transform: scale(0.95);
    background: #444;
}

.plays {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
}

@media (max-width: 480px) {
    #soundboard {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>

<h1>🎧 Klankenbord</h1>
<div id="soundboard"></div>

<script>
const BASE_PATH = "/sounds88/sounds/"; // 🔥 JOUW CORRECTE ROOT PAD

const sounds = [
    "Heheey.mp3",
    "Ja goed hoor.mp3",
    "MJaa.mp3",
    "Nee.mp3",
    "Met jou ook.mp3",
    "Ja doe maar.mp3",
    "Ooo wat geil.mp3",
    "Oo wacht even.mp3",
    "Ja zometeen.mp3",
    "Ik hoor je niet.mp3",
    "Okee.mp3",
    "Ja ik hoor je.mp3",
    "Eerst even klaarkomen.mp3",
    "Vond je het geil?.mp3",
    "Tot de volgende keer.mp3",
    "Ja oke is goed dat wil ik wel.mp3",
    "Waarom zo ongeduldig.mp3",
    "Ja ik wil eerst even klaarkomen.mp3",
    "Mag ik jou zien komen mag ik jou zien klaarkomen.mp3"
];

let playCounts = JSON.parse(localStorage.getItem("playCounts")) || {};
let currentAudio = null;

function getPath(file) {
    return BASE_PATH + encodeURIComponent(file);
}

function render() {
    const board = document.getElementById("soundboard");
    board.innerHTML = "";

    sounds.forEach(file => {
        const btn = document.createElement("button");

        const plays = playCounts[file] || 0;

        btn.innerHTML = `
            ${file.replace(".mp3","")}
            <div class="plays">${plays}x</div>
        `;

        btn.onclick = () => {

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            currentAudio = new Audio(getPath(file));
            currentAudio.preload = "auto";
            currentAudio.setAttribute("playsinline", "");

            const p = currentAudio.play();
            if (p) p.catch(e => console.log(e));

            playCounts[file] = (playCounts[file] || 0) + 1;
            localStorage.setItem("playCounts", JSON.stringify(playCounts));

            render();
        };

        board.appendChild(btn);
    });
}

render();
</script>

</body>
</html>
